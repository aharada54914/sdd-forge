summary: Full-profile post-implementation workflow-state invariants are internally contradictory; quality gates cannot reach a green check-workflow-state without human adjudication.
problem: |
  local-env-mcp is the first feature to exercise the full-profile
  check-workflow-state path end-to-end after implementation. Five defects
  surfaced; items 1-3 were reconciled by the orchestrator (disclosed below),
  items 4-5 are unreconcilable without either evidence fabrication or human
  decision:

  1. design.md is frozen once tasks.md exists (check-workflow-state line
     ~595 requires Impl Passed whenever tasks.md exists; stage-provenance
     binds the impl-review design hash with only the status header
     normalized). Yet task-review PASSED T-005 whose approved scope and
     Done When require updating design.md (OQ-001 resolution). Reconciled
     by restoring design.md to the impl-reviewed bytes (0f02d668...);
     the confirmed Cursor/VS Code formats survive in
     reports/implementation/local-env-mcp/T-005.md and USERGUIDE.md.
     CONSEQUENCE: T-005's Done When items 1-2 are now unsatisfiable as
     written.
  2. traceability.md is frozen by the task-stage raw-hash binding, yet
     T-010's approved scope appends a Verification Status section.
     Reconciled by restoring the task-reviewed bytes (15921dfb...); the
     appended table survives in the T-010 report. CONSEQUENCE: T-010's
     Done When item 2 is weakened (the reviewed AC->TEST->Task table was
     already final, so the claim is arguably still met).
  3. check-workflow-state's canonical task reviewer-output schema
     (stage "task-review", role "reviewer-a", manifest, checks[].status,
     findings[]) contradicts the shipped role file
     plugins/sdd-review-loop/agents/task-reviewer-a.md (stage "task",
     role "task-reviewer-a", allowed_input_manifest, checks[].result).
     A reviewer following its role file can never satisfy the checker.
     Reconciled by an orchestrator FIELD-ENCODING migration of the
     attempt-1/round-2 outputs (semantic content, identities, verdicts
     unchanged; originals preserved as *.rolefile-encoding.json).
  4. UNRESOLVED: the task-stage provenance requires every reviewer
     manifest set to include all four layer specs (ux/frontend/infra/
     security). The round-2 reviewer manifests omitted ux-spec and
     frontend-spec (and reviewer A all four) - an orchestration error in
     this run. Amending the persisted manifests would claim the reviewers
     received inputs they did not receive (fabrication - rejected).
  5. UNRESOLVED (deadlock): an honest re-review (task-review attempt 2
     with complete manifests) is impossible post-implementation because
     task-reviewer-a's INITIAL-STATE check mandates
     "Approval: must not be Approved" and Status in
     {Planned, In Progress, Blocked}, while the live tasks are
     Approval: Approved (sudo ...) / Status: Implementation Complete.
     Any truthful re-review returns NEEDS_WORK forever.

  Net effect: check-workflow-state exits 1
  ("task reviewer manifests omit layer inputs"), which the quality-gate
  skill runs as a scripted gate for every task. Downgrading or waiving
  this finding to reach Done would violate the gate's own calibration
  rules, so all ten tasks are held at Implementation Complete.
resolution: |
  Pending human decision. Options (non-exclusive):
  (a) Accept the round-2 task review as valid-in-substance despite the
      incomplete layer manifests (the two layer files omitted are the
      reasoned-N/A UX/Frontend specs, unchanged since impl review and
      hash-bound there), record the acceptance in this ticket, and grant
      a one-time documented exception for the local-env-mcp task stage -
      e.g. by amending check-workflow-state or recording an allowed
      exception mechanism, via the WFI process.
  (b) Amend task-reviewer-a.md INITIAL-STATE (and the checker/role-file
      schema mismatch) via WFI so post-implementation provenance
      re-reviews become possible, then run task-review attempt 2 with
      complete role-file inputs.
  (c) Amend the machinery so sanctioned post-review artifact updates
      (OQ resolutions, traceability finalization) re-bind hashes through
      a controlled re-review instead of freezing content
      (design.md / traceability.md).
  A WFI proposal covering 1-5 is recommended; WFI approval is
  human-owned and never sudo-bypassed.
