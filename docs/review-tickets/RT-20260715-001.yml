summary: Restore JavaScript tokenizer parity for a terminal escaped pipe inside a balanced quoted regex.
problem: |
  The JavaScript tokenizer advances its for-loop index twice after accepting a
  backslash-plus-pipe pair. For `grep -n "\\|" <protected-path> 2>&1`, that
  extra advance skips the balanced closing quote and returns an unclosed-quote
  denial, while the Python and PowerShell twins allow the same read-only form.
  The original focused corpus covered a double-backslash form but not the
  terminal single-backslash escaped-pipe form, so REQ-001 cross-runtime parity
  was incomplete.
expected_fix:
  - In the staged JavaScript candidate, consume exactly the escape pair and let
    the loop increment advance to the following character once.
  - Add a RED/GREEN three-runtime parity assertion for the terminal `"\\|"`
    read-only regex and preserve all protected-write denials.
  - Regenerate the immutable manifest, run the staged publication verifier,
    and have a human apply the updated manifest-bound candidate before rerunning
    the independent T-001 quality gate.
