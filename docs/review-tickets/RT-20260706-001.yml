  FAILS, NotImplementedError FAILS, mixed-case Lorem Ipsum FAILS, clean file
  PASSES, and the protected eval.tests.sh placeholder-stub scenario (which
  injects an uppercase '# TODO:') still FAILS as required. After apply,
