  marker keywords (TODO|FIXME|HACK|NotImplemented|PLACEHOLDER|
  TODO_REPLACE_WITH_PROJECT_COMMANDS) now match case-sensitively per the
  ALL-CAPS marker convention; multi-word phrases (not implemented, lorem
