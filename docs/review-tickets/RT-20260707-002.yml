  2. Add two Pester scenarios to tests/sdd-domain/check-domain-conformance.
     Tests.ps1: an unrecognized [[term:Name]] marker fixture and a
     design.md-references-missing-aggregate fixture, each asserted in both
     warn and SDD_DOMAIN_ENFORCE=error modes.
  3. When a domain/ directory is first adopted in a real project, have a
     human confirm (or replace) the [[term:Name]] heading-marker convention
     and record it in design.md, closing OQ-001.
