problem: |
  The isolated sdd-evaluator (RUN-20260707T0556Z-sdd-evaluator-T-008) returned
  VERDICT: PASS for T-008 with three deferrable Minor findings:
  1. Message-parity gap: for Check-2 (unrecognized term) findings, the .sh
     twin prefixes the source line number ("requirements.md:4: unrecognized
     term...") while the .ps1 twin omits it ("requirements.md: unrecognized
     term..."). Finding counts, WARN/FAILED verbs, and exit codes are
     identical; only the location prefix differs.
  2. Test-coverage gap: no Pester scenario exercises Check-2 (unrecognized
     [[term:Name]] heading marker) or Check-3's missing-aggregate-card path,
     although AC-009 names term/aggregate violations as in-scope. The
     evaluator verified both paths behave correctly (including
     SDD_DOMAIN_ENFORCE=error escalation) by direct execution against its
     own fixtures, so this is a coverage gap, not a behavior defect.
  3. Convention confirmation: the [[term:Name]] heading-marker convention
     that Check-2 consumes is introduced by the implementation and is not
     defined in any spec artifact (design.md OQ-001 / requirements.md OQ-R1
     left term-matching scope open). It is opt-in -- files without the marker
     never trigger Check-2 -- so there are no false positives against current
     specs, and the implementation report flags it for human confirmation.
expected_fix: |
  1. Add the line-number prefix to the .ps1 twin's Check-2 finding text to
     restore byte parity with the .sh twin (gate-script edit: apply via the
