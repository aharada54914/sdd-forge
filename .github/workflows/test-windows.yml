name: Test Windows installer

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository
        shell: pwsh
        run: ./tests/validate-repository.ps1
      - name: Test installer
        shell: pwsh
        run: ./tests/install.tests.ps1
