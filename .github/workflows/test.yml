name: Test installers and gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository
        shell: pwsh
        run: ./tests/validate-repository.ps1
      - name: Test deterministic gate scripts
        shell: pwsh
        run: ./tests/scripts.tests.ps1
      - name: Test hook guards
        shell: pwsh
        run: ./tests/hooks.tests.ps1
      - name: Test installer
        shell: pwsh
        run: ./tests/install.tests.ps1
      - name: Test POSIX installer
        if: runner.os == 'macOS'
        shell: bash
        run: ./tests/install.tests.sh
