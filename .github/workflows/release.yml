name: Release artifacts (sign + SBOM)

# C-06 / H-04: on a published GitHub Release, build a reproducible source
# tarball, generate a CycloneDX SBOM, publish SHA-256 checksums, and produce a
# sigstore-backed build-provenance attestation for each artifact. Verify with:
#   gh attestation verify sdd-forge-<tag>.tar.gz --repo aharada54914/sdd-forge
#   sha256sum -c SHA256SUMS
# All actions are pinned to commit SHAs (H-04).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (e.g. v0.9.0). Defaults to the current ref."
        required: false
        type: string
      run_host_smoke:
        description: "Run actual authenticated Codex/Claude/Copilot registration smoke."
        required: false
        default: false
        type: boolean

permissions:
  contents: write      # upload release assets
  id-token: write      # OIDC for keyless sigstore signing
  attestations: write  # store build-provenance attestations

jobs:
  loop-gate:
    # No elevated GitHub Actions permissions requested (REQ-002;
    # security-spec.md B4/OWASP "Elevation of Privilege" row): without this
    # override the job would silently inherit the workflow-level
    # contents:write / id-token:write / attestations:write block above
    # (release.yml:25-28), which it does not need -- it only checks out the
    # repository and runs local scripts.
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test loop consistency suite
        shell: bash
        run: bash ./tests/loop-consistency.tests.sh
      - name: Test loop inventory suite
        shell: bash
        run: bash ./tests/loop-inventory.tests.sh

  release:
    needs: loop-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pkg=sdd-forge-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build reproducible source tarball
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          PKG="${{ steps.meta.outputs.pkg }}"
          # Archive the resolved TAG's tree, not $GITHUB_SHA. On a manual
          # workflow_dispatch the run's ref (and $GITHUB_SHA) is the dispatch
          # branch, which would otherwise package unrelated branch contents
          # under the release tag. Fail closed if the tag does not exist.
          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag refs/tags/${TAG} not found in the repository" >&2
            exit 1
          fi
          # git archive excludes .git and honors .gitattributes export-ignore.
          git archive --format=tar.gz --prefix="sdd-forge-${TAG}/" -o "$PKG" "refs/tags/${TAG}"
          echo "Built $PKG ($(du -h "$PKG" | cut -f1)) from refs/tags/${TAG}"

      - name: Release-only real host smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_host_smoke }}
        env:
          SDD_RELEASE_HOST_SMOKE: "1"
        run: ./tests/release-host-smoke.sh

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          python3 .github/scripts/generate-sbom.py \
            --version "${{ steps.meta.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --output "sdd-forge-sbom.cdx.json"

      - name: Publish SHA-256 checksums
        run: |
          set -euo pipefail
          sha256sum "${{ steps.meta.outputs.pkg }}" "sdd-forge-sbom.cdx.json" > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance (sigstore keyless)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.meta.outputs.pkg }}
            sdd-forge-sbom.cdx.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.pkg }}" \
            "sdd-forge-sbom.cdx.json" \
            "SHA256SUMS" \
            --clobber
