name: Release artifacts (sign + SBOM)

# C-06 / H-04: on a published GitHub Release, build a reproducible source
# tarball, generate a CycloneDX SBOM, publish SHA-256 checksums, and produce a
# sigstore-backed build-provenance attestation for each artifact. Verify with:
#   gh attestation verify sdd-forge-<tag>.tar.gz --repo aharada54914/sdd-forge
#   sha256sum -c SHA256SUMS
# All actions are pinned to commit SHAs (H-04).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (e.g. v0.9.0). Defaults to the current ref."
        required: false
        type: string

permissions:
  contents: write      # upload release assets
  id-token: write      # OIDC for keyless sigstore signing
  attestations: write  # store build-provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pkg=sdd-forge-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build reproducible source tarball
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          PKG="${{ steps.meta.outputs.pkg }}"
          # git archive excludes .git and honors .gitattributes export-ignore.
          git archive --format=tar.gz --prefix="sdd-forge-${TAG}/" -o "$PKG" "$GITHUB_SHA"
          echo "Built $PKG ($(du -h "$PKG" | cut -f1))"

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          python3 .github/scripts/generate-sbom.py \
            --version "${{ steps.meta.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --output "sdd-forge-sbom.cdx.json"

      - name: Publish SHA-256 checksums
        run: |
          set -euo pipefail
          sha256sum "${{ steps.meta.outputs.pkg }}" "sdd-forge-sbom.cdx.json" > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance (sigstore keyless)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.meta.outputs.pkg }}
            sdd-forge-sbom.cdx.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.pkg }}" \
            "sdd-forge-sbom.cdx.json" \
            "SHA256SUMS" \
            --clobber
